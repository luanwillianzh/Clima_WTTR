<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Clima</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
</head>

<body class="bg-body-secondary">
    <nav class="navbar navbar-expand-lg bg-dark-subtle rounded-bottom-1">
        <div class="container-fluid">
            <h1 class="navbar-brandmb-01 h1">Clima WTTR.in</h1>
            <span class="navbar-text">Consulta de clima usando a API do <a class="link"
                    href="https://wttr.in">wttr.in</a></span>
        </div>
    </nav>
    <div class="container mt-4">
        <h5 class="card-title mb-1" id="cidade">Carregando...</h5>
        <div class="display-1 fw-bold" id="temperatura">--°C</div>
        <div class="fs-4 mb-4" id="descricao"></div>
        <div class="row text-center">
            <div class="col">
                <small class="text-body-secondary">Umidade</small>
                <div class="fw-semibold" id="umidade">--%</div>
            </div>

            <div class="col">
                <small class="text-body-secondary">Vento</small>
                <div class="fw-semibold" id="vento">-- km/h</div>
            </div>

            <div class="col">
                <small class="text-body-secondary">Sensação</small>
                <div class="fw-semibold" id="sensacao">--°C</div>
            </div>
        </div>
    </div>
    <div class="card shadow-sm mt-4">
        <div class="card-header">
            Próximas 24 horas
        </div>

        <div class="card-body">
            <div
                id="forecast"
                class="d-flex gap-3 overflow-auto pb-2">
            </div>
        </div>
    </div>
    <script>
async function carregarClima() {
    const response = await fetch("https://wttr.in/?format=j1&lang=pt-br");
    const json = await response.json();

    const atual = json.current_condition[0];

    document.getElementById("cidade").textContent =
        json.nearest_area[0].areaName[0].value;

    document.getElementById("temperatura").textContent =
        `${atual.temp_C}°C`;

    document.getElementById("descricao").innerHTML =
        `<img src="${atual.weatherIconUrl[0].value}" width="48" class="me-2">
         ${atual["lang_pt-br"][0].value}`;

    document.getElementById("umidade").textContent =
        `${atual.humidity}%`;

    document.getElementById("vento").textContent =
        `${atual.windspeedKmph} km/h`;

    document.getElementById("sensacao").textContent =
        `${atual.FeelsLikeC}°C`;

    const forecast = document.getElementById("forecast");
    forecast.innerHTML = "";

    // Apenas o dia atual
    json.weather[0].hourly.forEach(item => {

        const hora = item.time.padStart(4, "0").replace(/^24/, "00");

        const card = document.createElement("div");
        card.className = "card text-center flex-shrink-0";
        card.style.width = "120px";

        card.innerHTML = `
            <div class="card-body">
                <div class="fw-semibold mb-2">
                    ${hora.slice(0,2)}:${hora.slice(2)}
                </div>

                <img
                    src="${item.weatherIconUrl[0].value}"
                    width="48"
                    height="48"
                    alt="Ícone">

                <div class="fs-5 fw-bold mt-2">
                    ${item.tempC}°C
                </div>

                <small class="text-body-secondary">
                    ${item["lang_pt-br"][0].value}
                </small>
            </div>
        `;

        forecast.appendChild(card);
    });
}

carregarClima();
</script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
        crossorigin="anonymous"></script>
</body>

</html>
